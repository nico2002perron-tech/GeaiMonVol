name: Daily Deal Scanner

on:
  schedule:
    # 3 scans/jour — cycle complet en ~1.4 jours
    - cron: '0 8 * * *'    # 8h UTC (3h EST)
    - cron: '0 16 * * *'   # 16h UTC (11h EST)
    - cron: '0 0 * * *'    # 0h UTC (19h EST)
  workflow_dispatch:
    inputs:
      phases:
        description: 'Number of phases to run (default 12)'
        required: false
        default: '12'

env:
  TOTAL_PHASES: 59  # 1 explore + 47 deep + 3 all-inclusive hotel + 8 regular hotel

jobs:
  scan-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Run multiple scan phases
        run: |
          PHASES="${{ github.event.inputs.phases || '12' }}"
          DAY=$(date +%j)
          # Offset by 12 per run to avoid scanning same phases across 3 daily runs
          HOUR=$(date +%H)
          # 0h UTC → offset 0, 8h UTC → offset 12, 16h UTC → offset 24
          if [ "$HOUR" -ge 16 ]; then
            OFFSET=24
          elif [ "$HOUR" -ge 8 ]; then
            OFFSET=12
          else
            OFFSET=0
          fi

          echo "Running $PHASES phases (day=$DAY, offset=$OFFSET)..."
          SUCCESS=0
          FAIL=0

          for i in $(seq 0 $((PHASES - 1))); do
            PHASE=$(( (DAY * 10 + OFFSET + i) % $TOTAL_PHASES ))
            echo ""
            echo "=== Phase $PHASE ==="

            RESPONSE=$(curl -s -m 65 -w "\n%{http_code}" \
              "${{ secrets.VERCEL_APP_URL }}/api/cron/scan-prices?secret=${{ secrets.CRON_SECRET }}&phase=$PHASE")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)

            echo "HTTP $HTTP_CODE"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"

            if [ "$HTTP_CODE" = "200" ]; then
              SUCCESS=$((SUCCESS + 1))
            else
              FAIL=$((FAIL + 1))
              echo "::warning::Phase $PHASE failed with HTTP $HTTP_CODE"
            fi

            # Wait between phases to avoid overwhelming the API
            if [ "$i" -lt "$((PHASES - 1))" ]; then
              sleep 5
            fi
          done

          echo ""
          echo "=== Summary: $SUCCESS succeeded, $FAIL failed out of $PHASES ==="

          if [ "$FAIL" -gt "$((PHASES / 2))" ]; then
            echo "::error::More than half of phases failed"
            exit 1
          fi

  send-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: scan-prices
    steps:
      - name: Trigger send-alerts on Vercel
        run: |
          RESPONSE=$(curl -s -m 30 -w "\n%{http_code}" \
            "${{ secrets.VERCEL_APP_URL }}/api/cron/send-alerts?secret=${{ secrets.CRON_SECRET }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $HTTP_CODE"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
